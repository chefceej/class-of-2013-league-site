<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fantasy Baseball League — 2025</title>
  <link rel="stylesheet" href="css/styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
  <div class="container">
    <header>
      <h1>2025 Fantasy Baseball</h1>
      <p class="subtitle">Playoff Position — Points vs. 6th Place</p>
      <p class="last-updated" id="last-updated"></p>
    </header>

    <section class="chart-section">
      <h2>Playoff Position Chart</h2>
      <div class="chart-wrapper">
        <canvas id="playoffChart"></canvas>
      </div>
    </section>

    <section class="table-section">
      <h2>Current Standings</h2>
      <table id="standings-table">
        <thead>
          <tr>
            <th>Rank</th>
            <th>Team</th>
            <th>W</th>
            <th>L</th>
            <th>vs. 6th</th>
          </tr>
        </thead>
        <tbody id="standings-body"></tbody>
      </table>
    </section>

    <footer>
      <p>Data from ESPN Fantasy Baseball · Updated daily via GitHub Actions</p>
    </footer>
  </div>

  <script src="js/charts.js"></script>
</body>
</html>
